spring.application.name=backendapi

# configs das variáveis de ambiente
spring.config.import=optional:file:.env[.properties]

# configs das keys de autenticaçăo

jwt.public.key = classpath:app.pub
jwt.private.key = classpath:app.key

# habilita a execuçăo do data.sql
spring.sql.init.mode=always

# habilita a exibiçăo de mensagens de erro contidas nas exceptions
server.error.include-binding-errors=always
server.error.include-message=always

# essa opçăo abaixo cria a db do zero toda vez que inicia o app, facilitando em dev
spring.jpa.hibernate.ddl-auto=create
spring.jpa.defer-datasource-initialization=true
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.show-sql=true