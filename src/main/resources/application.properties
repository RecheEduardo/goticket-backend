spring.application.name=backendapi
spring.profiles.active=dev,docker

# configs das variáveis de ambiente
spring.config.import=optional:file:.env[.properties]

# configs das keys de autenticaçăo
jwt.public.key = classpath:app.pub
jwt.private.key = classpath:app.key

# Refresh token TTL em segundos (7 dias)
jwt.refresh.ttl=604800

# Stripe
stripe.api.key=${STRIPE_SECRET_KEY}
stripe.publishable.key=${STRIPE_PUBLISHABLE_KEY}
stripe.webhook.secret=${STRIPE_WEBHOOK_SECRET}
stripe.webhook.tolerance-seconds=300
stripe.api.timeout-ms=30000
stripe.api.max-network-retries=2

goticket.checkout.reservation.ttl-minutes=10
goticket.checkout.idempotency.ttl-hours=24

#Buckets S3
bucket.name=${BUCKET_NAME:goticket-dev}

# LocalStack/AWS S3 configuration
spring.cloud.aws.endpoint=http://localhost:4566
spring.cloud.aws.region.static=us-east-1
spring.cloud.aws.credentials.access-key=test
spring.cloud.aws.credentials.secret-key=test

# Força o uso do estilo de acesso por path (importante para emuladores)
spring.cloud.aws.s3.path-style-access-enabled=true

# habilita a exibiçăo de mensagens de erro contidas nas exceptions
server.error.include-binding-errors=always
server.error.include-message=always

# essa opçăo abaixo cria a db do zero toda vez que inicia o app, facilitando em dev
spring.jpa.hibernate.ddl-auto=validate
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=false
spring.flyway.validate-on-migrate=true

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.show-sql=true