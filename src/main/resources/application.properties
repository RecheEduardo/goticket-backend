spring.application.name=backendapi

# configs das variáveis de ambiente
spring.config.import=optional:file:.env[.properties]

# configs das keys de autenticação
jwt.public.key = classpath:app.pub
jwt.private.key = classpath:app.key

# Refresh token TTL em segundos (7 dias)
jwt.refresh.ttl=604800

#Buckets S3
bucket.name=${BUCKET_NAME:goticket-random}

# LocalStack/AWS S3 configuration
spring.cloud.aws.endpoint=http://localhost:4566
spring.cloud.aws.region.static=us-east-1
spring.cloud.aws.credentials.access-key=test
spring.cloud.aws.credentials.secret-key=test

# Força o uso do estilo de acesso por path (importante para emuladores)
spring.cloud.aws.s3.path-style-access-enabled=true

# habilita a execução do data.sql
spring.sql.init.mode=always

# habilita a exibição de mensagens de erro contidas nas exceptions
server.error.include-binding-errors=always
server.error.include-message=always

# essa opção abaixo cria a db do zero toda vez que inicia o app, facilitando em dev
spring.jpa.hibernate.ddl-auto=create
spring.jpa.defer-datasource-initialization=true
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.show-sql=true